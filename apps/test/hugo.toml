# -------------------------------------------------------------------------------------
# Hugo Configuration
# See: https://gohugo.io/configuration/all/
# -------------------------------------------------------------------------------------

title = "FixIt TEST"
baseURL = "https://demo.fixit.lruihao.cn/test/"
ignoreLogs = [ "warning-file-tree" ]
defaultContentLanguage = "en"

# test for multilingual support
# [languages]

# [languages.en]
# languageCode = "en"
# languageName = "English"

# [languages.zh-cn]
# languageCode = "zh-CN"
# languageName = "简体中文"

[permalinks]

[permalinks.page]
posts = "/units/:slugorcontentbasename"

[permalinks.section]
posts = "/units/"

[markup]
_merge = "shallow"

[outputs]
_merge = "shallow"

[taxonomies]
_merge = "shallow"

# -------------------------------------------------------------------------------------
# Theme Core Configuration
# See: https://fixit.lruihao.cn/documentation/basics/#theme-configuration
# -------------------------------------------------------------------------------------

[params]
version = "1.0.X"
collection_list = true
collection_navigation = true

[params.home.profile]
enable = true
avatar_url = "/images/fixit-test.png"

[params.social]

[params.social.github]
id = "hugo-fixit"
weight = 2

[params.social.twitter]
id = "lruihao"
weight = 1
# for twitter cards
# site = "hugo-fixit"

[params.author]
name = "Lruihao"
email = ""
link = "https://lruihao.cn"
avatar = "https://lruihao.cn/images/avatar.jpg"
